name: 'SSH deploy action'
description: 'Execute command on remote server'
author: 'Andy Schneider'
inputs:
  host:
    description: 'SSH hostname'
    required: true
  user:
    description: 'SSH User name'
    required: true
  key:
    description: 'Private key'
    required: true
  cmd:
    description: 'Command'
    required: true
  port:
    description: 'SSH port'
    required: false
    default: '22'
runs:
  using: 'docker'
  image: 'Dockerfile'